<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap-preventivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
            <!-- Added 'data-bs-theme="dark"' to apply the dark theme to the navbar -->
            <div class="container-lg">
                <a class="navbar-brand" href="#">Bool Factory</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <!-- Added 'justify-content-end' class to align nav-items to the right at the end of the page -->
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Servizi</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contatti</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- MAIN - Form section -->
    <main class="container-lg mt-3">
        <h2>Richiesta Preventivo</h2>
        <p>Compila il form per richiedere un preventivo per i nostri servizi di sviluppo.</p>
        <form class="row g-3 needs-validation" novalidate>  <!-- Form for requesting a quote with Bootstrap validation -->
            <div class="col-12 col-md-8"> <!-- Name Section-->
                <label for="name-user" class="form-label">Nome</label>
                <input type="text" class="form-control" id="name-user" required>
                <div class="valid-feedback">
                    Looks good!                 <!-- Bootstrap Validation -->
                </div>
            </div>
            <div class="col-12 col-md-8">   <!-- Surname Section-->
                <label for="surname-user" class="form-label">Cognome</label>
                <input type="text" class="form-control" id="surname-user" required>
                <div class="valid-feedback">
                    Looks good!
                </div>
            </div>
            <div class="col-12 col-md-8">   <!-- Email Section-->
                <label for="email-user" class="form-label">Email</label>
                <input type="email" class="form-control" id="email-user" required>
                <div class="valid-feedback">
                    Looks good!
                </div>
            </div>
            <div class="col-12 col-md-8">   <!-- Work selection Section-->
                <label for="select-work" class="form-label">Tipo di lavoro</label>
                <select class="form-select" id="select-work" required>
                    <option selected disabled value="">Seleziona il tipo di lavoro</option>
                    <option value="1">Sviluppo beckend</option>
                    <option value="2">Sviluppo frontend</option>
                    <option value="3">Analisi progettuale</option>
                </select>
                <div class="invalid-feedback">
                    Please select a valid state.
                </div>
            </div>
            <div class="col-12 col-md-8">   <!-- Textarea Section-->
                <label for="text-area" class="form-label">Textarea con Bootstrap 5</label>
                <textarea class="form-control" id="text-area" rows="3"></textarea>
            </div>
            <div class="col-12 col-md-8">   <!-- Promo code Section-->
                <label for="promo-code" class="form-label">Codice Promozionale (opzionale)</label>
                <input type="text" class="form-control" id="promo-code">
                <div class="valid-feedback">
                    Looks good!
                </div>
            </div>
            <div>
                <div class="form-check">    <!-- Privacy Policy Section-->
                    <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required>
                    <label class="form-check-label" for="invalidCheck">
                        Accetto la Privacy Policy
                    </label>
                    <div class="invalid-feedback">
                        You must agree before submitting.
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4 text-center">   <!-- Submit bottom Section-->
                <button class="btn btn-primary" type="submit">Calcola Preventivo</button>
            </div>
            <div class="col-12 col-md-4 text-center ">  <!-- Quote result-->
                <h5>Prezzo finale</h5>
                <p>---,--</p>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
